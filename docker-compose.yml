services:
  db:
    image: postgres:16-alpine
    container_name: mylifemanager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mylifemanager
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mylifemanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mylifemanager-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/mylifemanager?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: development
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 5242880
    ports:
      - "3001:3001"
    volumes:
      - ./api/uploads:/app/api/uploads
      - .:/app
      - /app/node_modules
    command: sh -c "yarn workspace api prisma generate && yarn workspace api prisma migrate deploy && yarn workspace api dev"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: mylifemanager-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_PROXY_TARGET: http://api:3001
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: yarn workspace web dev --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
