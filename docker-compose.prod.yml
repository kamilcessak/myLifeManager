services:
  db:
    image: postgres:16-alpine
    container_name: mlm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-mylifemanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mylifemanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.prod
    container_name: mlm-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mylifemanager}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      API_URL: ${API_URL:-http://localhost}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      PUBLIC_VAPID_KEY: ${PUBLIC_VAPID_KEY:-}
      PRIVATE_VAPID_KEY: ${PRIVATE_VAPID_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-}
    volumes:
      - api_uploads:/app/api/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    build:
      context: .
      dockerfile: web/Dockerfile.prod
    container_name: mlm-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  api_uploads:
  caddy_data:
  caddy_config:
